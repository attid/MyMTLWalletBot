{% extends "base.html" %}

{% block page_title_key %}settings.page_title{% endblock %}
{% block title %}Manage keys{% endblock %}

{% block content %}
<div class="card" id="settings-card">
    <h2 data-i18n="settings.card_title">Saved keys</h2>

    <div id="keys-list" class="key-list"></div>

    <div id="no-keys-message" class="hidden">
        <p class="hint" data-i18n="settings.no_keys">No saved keys</p>
    </div>

    <div class="divider"></div>

    <button class="btn btn-secondary" data-i18n="common.back" onclick="goBack()">
        Back
    </button>
</div>
{% endblock %}

{% block scripts %}
<script>
// Initialize Telegram WebApp
const tg = Telegram.WebApp;
tg.ready();
tg.expand();

// Apply Telegram theme
document.body.style.backgroundColor = tg.themeParams.bg_color || '#fff';
document.body.style.color = tg.themeParams.text_color || '#000';

async function init() {
    await loadKeys();
}

async function loadKeys() {
    const listEl = document.getElementById("keys-list");
    const noKeysEl = document.getElementById("no-keys-message");
    listEl.innerHTML = "";

    const addresses = await CryptoStorage.listAddresses();
    let validKeysCount = 0;

    const walletsLabel = t("settings.wallets_label");
    const deleteTitle = t("settings.delete_title");

    for (const addr of addresses) {
        const keyInfo = await CryptoStorage.getKeyInfo(addr);

        // Skip legacy keys without mode
        if (!keyInfo) {
            continue;
        }

        validKeysCount++;
        const wallets = CryptoStorage.getWalletsForSigner(addr);
        const modeLabel = keyInfo.mode === "biometric"
            ? t("settings.mode_biometric")
            : t("settings.mode_password");
        const modeIcon = keyInfo.mode === "biometric" ? "&#128274;" : "&#128273;";

        const item = document.createElement("div");
        item.className = "key-card";
        item.innerHTML = `
            <div class="key-header">
                <span class="key-address" title="${addr}">${formatAddress(addr)}</span>
                <button class="btn-delete" onclick="deleteKey('${addr}')" title="${deleteTitle}">&#10005;</button>
            </div>
            <div class="key-mode">
                <span class="mode-icon">${modeIcon}</span>
                <span class="mode-text">${modeLabel}</span>
            </div>
            ${wallets.length > 0 ? `
                <div class="linked-wallets">
                    <span class="label">${walletsLabel}</span>
                    ${wallets.map(w => `<span class="wallet-tag" title="${w}">${formatAddress(w)}</span>`).join('')}
                </div>
            ` : ''}
        `;
        listEl.appendChild(item);
    }

    if (validKeysCount === 0) {
        showElement("no-keys-message");
    } else {
        hideElement("no-keys-message");
    }
}

async function deleteKey(address) {
    const confirmMsg = t("settings.delete_confirm", { address: formatAddress(address) });
    if (!confirm(confirmMsg)) {
        return;
    }

    try {
        // Remove all wallet mappings for this signer
        CryptoStorage.removeSignerMappings(address);

        // Delete the key itself
        await CryptoStorage.deleteKey(address);

        showToast(t("settings.key_deleted"));
        await loadKeys();
    } catch (error) {
        showToast(t("settings.error_prefix", { msg: error.message }), "error");
    }
}

function goBack() {
    if (window.history.length > 1) {
        window.history.back();
    } else {
        tg.close();
    }
}

// Helpers
function formatAddress(addr) {
    if (!addr || addr.length < 12) return addr;
    return addr.substring(0, 6) + "..." + addr.substring(addr.length - 6);
}

function showElement(id) {
    document.getElementById(id).classList.remove("hidden");
}

function hideElement(id) {
    document.getElementById(id).classList.add("hidden");
}

function showToast(message, type = "info") {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.className = `toast show ${type}`;
    setTimeout(() => {
        toast.className = "toast";
    }, 3000);
}

// Start
init();
</script>
{% endblock %}
