name: E2E Nightly Canary

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

env:
  BOT_TOKEN: "123456:TEST_TOKEN"
  TEST_BOT_TOKEN: "123456:TEST_TOKEN"
  BASE_FEE: "100"
  DB_URL: "sqlite+aiosqlite:///tmp/mmwb-test.db"
  REDIS_URL: "redis://localhost:6379/0"
  TRON_API_KEY: "test"
  TRON_MASTER_ADDRESS: "test"
  TRON_MASTER_KEY: "test"
  THOTHPAY_API: "test"
  OPENAI_KEY: "test"
  EURMTL_KEY: "test"
  SENTRY_DSN: "https://examplePublicKey@o0.ingest.sentry.io/0"
  HORIZON_URL: "https://horizon-testnet.stellar.org"
  HORIZON_URL_RW: "https://horizon-testnet.stellar.org"
  MONGODB_URL: "mongodb://localhost:27017/mmwb_test"
  GRIST_TOKEN: "test"
  TONCONSOLE_TOKEN: "test"
  TON_TOKEN: "test"
  WALLET_COST: "1"

jobs:
  testnet-canary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libzbar0

      - name: Run testnet canary
        run: cd bot && uv run --package mmwb-bot pytest tests/external/test_testnet_canary.py -m external -v
